name: Mise à jour quotidienne NORDIQ-20

on:
  schedule:
    - cron: "30 21 * * 1-5"  # 21h30 UTC = 17h30 HNE (après clôture TSX 16h00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Mettre à jour l'indice
        run: npm run update

      - name: Commit et push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --staged --quiet || git commit -m "chore: mise à jour quotidienne $(date -u +%Y-%m-%d)"
          git push
