name: Mise à jour quotidienne ICQ-20

on:
  # Cron : 21h30 UTC = 17h30 HNE (heure normale) / 16h30 HAE (heure avancée)
  # La TSX ferme à 16h00 heure locale (21h00 UTC en hiver, 20h00 UTC en été).
  # Ce créneau couvre les deux régimes sans ajustement saisonnier.
  schedule:
    - cron: "30 21 * * 1-5"

  # Déclenchement manuel depuis l'onglet Actions de GitHub
  workflow_dispatch:

jobs:
  update:
    name: Calcul et commit de data.json
    runs-on: ubuntu-latest

    permissions:
      contents: write   # nécessaire pour git push

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Mise à jour de l'indice
        run: npm run update

      - name: Vérifier s'il y a des changements
        id: changes
        run: |
          git diff --quiet data/data.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit et push de data.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git commit -m "chore: mise à jour ICQ-20 $(date -u +%Y-%m-%d)"
          git push
