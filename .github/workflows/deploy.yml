name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # Redéploie après la mise à jour quotidienne. Nécessaire car un push fait par le
  # GITHUB_TOKEN ne déclenche pas l'événement « push » (règle anti-récursion de GitHub).
  workflow_run:
    workflows: ["Mise à jour quotidienne NORDIQ-20"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Sur workflow_run, ne déployer que si la mise à jour quotidienne a réussi.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Toujours récupérer la pointe de main (le commit de données fraîchement poussé
          # par update.yml n'est pas le head_sha de l'événement workflow_run).
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build Vite
        run: npm run build --workspace=web

      - name: Copier les données dans dist
        run: |
          cp data/data.json web/dist/data.json
          cp data/data-backtest.json web/dist/data-backtest.json
          cp data/data-revised.json web/dist/data-revised.json
          cp data/data-na.json web/dist/data-na.json
          cp data/data-nordmax.json web/dist/data-nordmax.json
          cp data/data-usa.json web/dist/data-usa.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - uses: actions/deploy-pages@v4
        id: deployment
